<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSuggest Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#e94560;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.search-box{position:relative;text-align:left}
.input-wrapper{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:16px;display:flex;align-items:center;padding:0 16px;transition:all .3s}
.input-wrapper:focus-within{border-color:#e94560;box-shadow:0 0 20px rgba(233,69,96,0.15)}
.input-wrapper .search-icon{color:rgba(255,255,255,0.25);margin-right:12px;font-size:.9rem;font-weight:300}
.input-wrapper input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:1rem;padding:16px 0;font-family:inherit}
.input-wrapper input::placeholder{color:rgba(255,255,255,0.25)}
.clear-btn{background:none;border:none;color:rgba(255,255,255,0.25);cursor:pointer;font-size:.85rem;display:none;padding:4px 8px;border-radius:6px;transition:all .2s}
.clear-btn.visible{display:block}
.clear-btn:hover{color:#fff;background:rgba(255,255,255,0.1)}
.suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(22,33,62,0.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:6px;display:none;box-shadow:0 16px 48px rgba(0,0,0,0.4);max-height:280px;overflow-y:auto}
.suggestions.visible{display:block}
.suggestion-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,0.7);font-size:.9rem}
.suggestion-item:hover,.suggestion-item.highlighted{background:rgba(233,69,96,0.12);color:#fff;padding-left:18px}
.suggestion-item .si-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.suggestion-item .si-category{font-size:.65rem;color:rgba(255,255,255,0.25);margin-left:auto;text-transform:uppercase;letter-spacing:.08em}
.suggestions .no-results{padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:.85rem}
.result-display{margin-top:20px;padding:14px 16px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.06);display:none;text-align:left}
.result-display.visible{display:block}
.result-display .r-label{color:rgba(255,255,255,0.2);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.result-display .r-value{color:#fff;font-size:1rem;font-weight:600}
</style>
</head>
<body>
<div class="container">
<div class="title">Auto <em>Suggest</em></div>
<div class="sub">Type to filter suggestions</div>
<div class="search-box">
<div class="input-wrapper">
<span class="search-icon">~</span>
<input type="text" id="searchInput" placeholder="Search languages, frameworks..." autocomplete="off">
<button class="clear-btn" id="clearBtn">x</button>
</div>
<div class="suggestions" id="suggestions"></div>
</div>
<div class="result-display" id="result">
<div class="r-label">Selected</div>
<div class="r-value" id="resultValue">--</div>
</div>
</div>
<script>
const data=[
{name:"React",cat:"Framework",color:"#61dafb"},{name:"Angular",cat:"Framework",color:"#dd0031"},{name:"Vue.js",cat:"Framework",color:"#4fc08d"},
{name:"Node.js",cat:"Runtime",color:"#339933"},{name:"Rust",cat:"Language",color:"#dea584"},{name:"Python",cat:"Language",color:"#3776ab"},
{name:"Java",cat:"Language",color:"#007396"},{name:"Ruby",cat:"Language",color:"#cc342d"},{name:"TypeScript",cat:"Language",color:"#3178c6"},
{name:"JavaScript",cat:"Language",color:"#f7df1e"},{name:"Tailwind CSS",cat:"Framework",color:"#06b6d4"},{name:"Flutter",cat:"Framework",color:"#02569b"},
{name:"Swift",cat:"Language",color:"#fa7343"},{name:"TensorFlow",cat:"Library",color:"#ff6f00"},{name:"PostgreSQL",cat:"Database",color:"#4169e1"},
{name:"MongoDB",cat:"Database",color:"#47a248"},{name:"Firebase",cat:"Platform",color:"#ffca28"},{name:"AWS",cat:"Cloud",color:"#ff9900"},
{name:"Docker",cat:"Tool",color:"#2496ed"},{name:"Next.js",cat:"Framework",color:"#000000"},
];
const input=document.getElementById('searchInput'),suggestions=document.getElementById('suggestions'),clearBtn=document.getElementById('clearBtn');
const result=document.getElementById('result'),resultValue=document.getElementById('resultValue');
let idx=-1;
function filter(q){const t=q.toLowerCase().trim();if(!t)return[];return data.filter(i=>i.name.toLowerCase().includes(t)||i.cat.toLowerCase().includes(t)).slice(0,7);}
function render(items){if(!items.length){suggestions.innerHTML='<div class="no-results">No matches found</div>';suggestions.classList.add('visible');return;}
suggestions.innerHTML=items.map((i,n)=>'<div class="suggestion-item '+(n===idx?'highlighted':'')+'" data-index="'+n+'"><span class="si-icon" style="background:'+i.color+'">'+i.name[0]+'</span><span>'+i.name+'</span><span class="si-category">'+i.cat+'</span></div>').join('');
suggestions.classList.add('visible');}
function select(item){input.value=item.name;result.classList.add('visible');resultValue.textContent=item.name+' -- '+item.cat;suggestions.classList.remove('visible');clearBtn.classList.add('visible');idx=-1;}
input.addEventListener('input',()=>{const items=filter(input.value);idx=-1;if(input.value.trim()){render(items);clearBtn.classList.add('visible');}else{suggestions.classList.remove('visible');clearBtn.classList.remove('visible');result.classList.remove('visible');}});
input.addEventListener('keydown',(e)=>{const items=filter(input.value);if(!suggestions.classList.contains('visible')||!items.length)return;
if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);render(items);}
if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,-1);render(items);}
if(e.key==='Enter'&&idx>=0){e.preventDefault();select(items[idx]);}
if(e.key==='Escape'){suggestions.classList.remove('visible');input.blur();}});
suggestions.addEventListener('click',(e)=>{const i=e.target.closest('.suggestion-item');if(!i)return;const items=filter(input.value);if(items[parseInt(i.dataset.index)])select(items[parseInt(i.dataset.index)]);});
clearBtn.addEventListener('click',()=>{input.value='';suggestions.classList.remove('visible');clearBtn.classList.remove('visible');result.classList.remove('visible');input.focus();});
document.addEventListener('click',(e)=>{if(!e.target.closest('.search-box'))suggestions.classList.remove('visible');});
</script>
</body>
</html>
