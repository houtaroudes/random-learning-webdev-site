<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café POS System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f5f0eb,#e8e0d8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.pos-wrapper{width:100%;max-width:920px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.06)}
.pos-header{background:#2d1b69;color:#fff;padding:20px 28px;display:flex;justify-content:space-between;align-items:center}
.pos-header h1{font-size:1.2rem;font-weight:700;letter-spacing:.03em}
.pos-header .order-no{font-size:.8rem;opacity:0.6;font-family:monospace}
.pos-body{display:grid;grid-template-columns:1fr 340px;min-height:480px}
.menu-panel{padding:24px;background:#fafafa;border-right:1px solid #eee}
.menu-panel .panel-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:#999;margin-bottom:16px;font-weight:600}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-item{padding:16px 12px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;cursor:pointer;transition:all .2s;text-align:center}
.menu-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(45,27,105,0.06);border-color:#d4cce6}
.menu-item:active{transform:translateY(0);background:#f8f6ff}
.menu-item .item-icon{width:40px;height:40px;margin:0 auto 6px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff}
.menu-item .item-name{font-size:.82rem;font-weight:600;color:#333;margin-bottom:2px}
.menu-item .item-price{font-size:.75rem;color:#888;font-family:monospace}
.cart-panel{display:flex;flex-direction:column}
.cart-header{padding:24px 20px 16px;border-bottom:1px solid #eee}
.cart-header .cart-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:#999;font-weight:600}
.cart-items{flex:1;overflow-y:auto;padding:12px 20px;min-height:200px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3f0f0;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.cart-item .ci-left{min-width:0;flex:1}
.cart-item .ci-name{font-size:.85rem;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
.cart-item .ci-name .ci-badge{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.cart-item .ci-price{font-size:.72rem;color:#999;margin-top:3px;font-family:monospace;margin-left:30px}
.cart-item .ci-qty{display:flex;align-items:center;gap:8px;margin:0 10px}
.cart-item .ci-qty button{width:26px;height:26px;border-radius:7px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#555;font-weight:600}
.cart-item .ci-qty button:hover{background:#2d1b69;color:#fff;border-color:#2d1b69}
.cart-item .ci-qty span{font-size:.85rem;font-weight:600;min-width:18px;text-align:center;color:#333}
.cart-item .ci-total{font-size:.82rem;font-weight:600;color:#333;min-width:60px;text-align:right;font-family:monospace}
.cart-item .ci-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;padding:2px 4px;margin-left:4px;transition:color .15s;font-weight:300}
.cart-item .ci-remove:hover{color:#e74c3c}
.cart-footer{padding:16px 20px;border-top:1px solid #eee;background:#fafafa}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:.82rem;color:#666}
.cart-total-row.total{font-size:1.05rem;font-weight:700;color:#2d1b69;margin-top:10px;padding-top:10px;border-top:2px solid #eee}
.checkout-btn{width:100%;margin-top:14px;padding:14px;background:#2d1b69;color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.02em}
.checkout-btn:hover{background:#3d2979;transform:translateY(-1px);box-shadow:0 4px 16px rgba(45,27,105,0.2)}
.checkout-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none!important}
.empty-cart{padding:48px 20px;text-align:center;color:#ccc;font-size:.82rem}
.menu-icons{display:none}
@media(max-width:640px){.pos-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="pos-wrapper">
<div class="pos-header">
<h1>CAFE POS</h1>
<span class="order-no">#ORD-2026</span>
</div>
<div class="pos-body">
<div class="menu-panel">
<div class="panel-label">Menu Items</div>
<div class="menu-grid" id="menuGrid">
<div class="menu-item" data-name="Cafe Latte" data-price="4.50" data-color="#6b4c3b"><div class="item-icon" style="background:#6b4c3b">LA</div><div class="item-name">Cafe Latte</div><div class="item-price">P4.50</div></div>
<div class="menu-item" data-name="Cappuccino" data-price="4.00" data-color="#8b6914"><div class="item-icon" style="background:#8b6914">CA</div><div class="item-name">Cappuccino</div><div class="item-price">P4.00</div></div>
<div class="menu-item" data-name="Espresso" data-price="3.00" data-color="#3c2415"><div class="item-icon" style="background:#3c2415">ES</div><div class="item-name">Espresso</div><div class="item-price">P3.00</div></div>
<div class="menu-item" data-name="Mocha" data-price="5.00" data-color="#4a2c2a"><div class="item-icon" style="background:#4a2c2a">MO</div><div class="item-name">Mocha</div><div class="item-price">P5.00</div></div>
<div class="menu-item" data-name="Croissant" data-price="3.50" data-color="#c8a24e"><div class="item-icon" style="background:#c8a24e">CR</div><div class="item-name">Croissant</div><div class="item-price">P3.50</div></div>
<div class="menu-item" data-name="Blueberry Muffin" data-price="3.00" data-color="#5b4a7a"><div class="item-icon" style="background:#5b4a7a">BM</div><div class="item-name">Blueberry Muffin</div><div class="item-price">P3.00</div></div>
<div class="menu-item" data-name="Sandwich" data-price="6.50" data-color="#8a6e4b"><div class="item-icon" style="background:#8a6e4b">SW</div><div class="item-name">Sandwich</div><div class="item-price">P6.50</div></div>
<div class="menu-item" data-name="Green Tea" data-price="3.50" data-color="#4a7a5c"><div class="item-icon" style="background:#4a7a5c">GT</div><div class="item-name">Green Tea</div><div class="item-price">P3.50</div></div>
</div>
</div>
<div class="cart-panel">
<div class="cart-header"><div class="cart-label">Order Receipt</div></div>
<div class="cart-items" id="cartItems"><div class="empty-cart">Your cart is empty<br>Tap an item to add</div></div>
<div class="cart-footer">
<div class="cart-total-row"><span>Subtotal</span><span id="subtotal">P0.00</span></div>
<div class="cart-total-row"><span>VAT (12%)</span><span id="vat">P0.00</span></div>
<div class="cart-total-row total"><span>Total</span><span id="total">P0.00</span></div>
<button class="checkout-btn" id="checkoutBtn" disabled>Place Order</button>
</div>
</div>
</div>
</div>
<script>
const cart = {};
const menuGrid = document.getElementById('menuGrid');
const cartItems = document.getElementById('cartItems');
const subtotalEl = document.getElementById('subtotal');
const vatEl = document.getElementById('vat');
const totalEl = document.getElementById('total');
const checkoutBtn = document.getElementById('checkoutBtn');
const iconColors = {};
document.querySelectorAll('.menu-item').forEach(item => {
const name = item.dataset.name;
iconColors[name] = item.dataset.color;
});
menuGrid.addEventListener('click', (e) => {
const item = e.target.closest('.menu-item');
if (!item) return;
const name = item.dataset.name;
const price = parseFloat(item.dataset.price);
const color = item.dataset.color;
if (cart[name]) {
cart[name].qty++;
} else {
cart[name] = { name, price, color, qty: 1 };
}
renderCart();
});
function getInitials(name) {
return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}
function renderCart() {
const items = Object.values(cart);
if (items.length === 0) {
cartItems.innerHTML = '<div class="empty-cart">Your cart is empty<br>Tap an item to add</div>';
checkoutBtn.disabled = true;
updateTotals(0);
return;
}
checkoutBtn.disabled = false;
let subtotal = 0;
cartItems.innerHTML = items.map((item) => {
const total = item.price * item.qty;
subtotal += total;
return `<div class="cart-item">
<div class="ci-left">
<div class="ci-name"><span class="ci-badge" style="background:${item.color}">${getInitials(item.name)}</span>${item.name}</div>
<div class="ci-price">P${item.price.toFixed(2)} each</div>
</div>
<div class="ci-qty">
<button onclick="updateQty('${item.name}', -1)">-</button>
<span>${item.qty}</span>
<button onclick="updateQty('${item.name}', 1)">+</button>
</div>
<span class="ci-total">P${total.toFixed(2)}</span>
<button class="ci-remove" onclick="removeItem('${item.name}')">x</button>
</div>`;
}).join('');
updateTotals(subtotal);
}
function updateQty(name, delta) {
if (!cart[name]) return;
cart[name].qty += delta;
if (cart[name].qty <= 0) delete cart[name];
renderCart();
}
function removeItem(name) {
delete cart[name];
renderCart();
}
function updateTotals(subtotal) {
const vat = subtotal * 0.12;
const total = subtotal + vat;
subtotalEl.textContent = 'P' + subtotal.toFixed(2);
vatEl.textContent = 'P' + vat.toFixed(2);
totalEl.textContent = 'P' + total.toFixed(2);
}
checkoutBtn.addEventListener('click', () => {
if (Object.keys(cart).length === 0) return;
const items = Object.values(cart);
const qty = items.reduce((s,i) => s + i.qty, 0);
const total = items.reduce((sum, item) => sum + item.price * item.qty, 0) * 1.12;
let receipt = 'RECEIPT\n';
receipt += '----------------\n';
items.forEach(i => { receipt += `${i.name} x${i.qty}  P${(i.price*i.qty).toFixed(2)}\n`; });
receipt += '----------------\n';
receipt += `Total: P${total.toFixed(2)}\n`;
receipt += `VAT: P${(total * 0.12 / 1.12).toFixed(2)}\n\n`;
receipt += 'Thank you for your order!';
alert(receipt);
for (const key in cart) delete cart[key];
renderCart();
});
</script>
</body>
</html>
