<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#e94560;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.generator-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.password-display{display:flex;align-items:center;gap:10px;margin-bottom:24px;background:rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.06);border-radius:14px;padding:4px 4px 4px 16px}
.password-display .pw-text{flex:1;color:#fff;font-family:'Courier New',monospace;font-size:1.1rem;font-weight:600;padding:14px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em}
.password-display .pw-strength{font-size:.65rem;padding:4px 10px;border-radius:6px;font-weight:600;text-transform:uppercase}
.copy-btn{background:rgba(255,255,255,0.06);border:none;color:#fff;width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:.85rem;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.copy-btn:hover{background:rgba(233,69,96,0.15);transform:scale(1.05)}
.copy-btn.copied{background:rgba(74,222,128,0.15)}
.options{display:flex;flex-direction:column;gap:16px}
.option-row{display:flex;align-items:center;justify-content:space-between}
.option-label{color:rgba(255,255,255,0.6);font-size:.9rem}
.length-control{display:flex;align-items:center;gap:12px}
.length-control input[type="range"]{width:140px;accent-color:#e94560;cursor:pointer}
.length-value{color:#fff;font-weight:600;font-size:1.1rem;min-width:28px;text-align:center}
.toggle-group{display:flex;flex-wrap:wrap;gap:10px}
.toggle-btn{padding:8px 16px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:10px;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .2s;font-size:.85rem;font-family:inherit}
.toggle-btn.active{border-color:#e94560;background:rgba(233,69,96,0.1);color:#e94560}
.regenerate-btn{width:100%;margin-top:20px;padding:14px;background:#e94560;border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.regenerate-btn:hover{background:#ff6b81;transform:translateY(-1px);box-shadow:0 4px 16px rgba(233,69,96,0.3)}
</style>
</head>
<body>
<div class="container">
<div class="title">Password <em>Generator</em></div>
<div class="sub">Create secure, random passwords</div>
<div class="generator-card">
<div class="password-display">
<span class="pw-text" id="passwordText">P@ssw0rd!</span>
<span class="pw-strength" id="strengthBadge">Strong</span>
<button class="copy-btn" id="copyBtn">CPY</button>
</div>
<div class="options">
<div class="option-row">
<span class="option-label">Length</span>
<div class="length-control">
<input type="range" id="lengthSlider" min="6" max="40" value="16">
<span class="length-value" id="lengthValue">16</span>
</div>
</div>
<div class="option-row">
<span class="option-label">Include</span>
<div class="toggle-group">
<button class="toggle-btn active" data-type="upper">A-Z</button>
<button class="toggle-btn active" data-type="lower">a-z</button>
<button class="toggle-btn active" data-type="numbers">0-9</button>
<button class="toggle-btn active" data-type="symbols">#$!</button>
</div>
</div>
</div>
<button class="regenerate-btn" id="generateBtn">Generate New Password</button>
</div>
</div>
<script>
const pwText=document.getElementById('passwordText'),strength=document.getElementById('strengthBadge'),copyBtn=document.getElementById('copyBtn');
const lenS=document.getElementById('lengthSlider'),lenV=document.getElementById('lengthValue'),genBtn=document.getElementById('generateBtn');
const cs={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',numbers:'0123456789',symbols:'!@#$%^&*()-_=+[]{}|;:,.<>?/~`'};
function getActive(){return Array.from(document.querySelectorAll('.toggle-btn.active')).map(b=>b.dataset.type);}
function generate(){const len=parseInt(lenS.value),types=getActive();if(!types.length)return'Select options';
let chars=types.map(t=>cs[t]).join(''),pw='';for(let i=0;i<len;i++)pw+=chars[Math.floor(Math.random()*chars.length)];
let g=types.map(t=>cs[t][Math.floor(Math.random()*cs[t].length)]).join('');
return pw.substring(0,len-g.length)+g;pw.split('').sort(()=>Math.random()-0.5).join('');}
function updateStrength(pw){const s=Math.min(pw.length*4+(/\d/.test(pw)?10:0)+(/[!@#$%^&*]/.test(pw)?10:0),100);
if(s<30){strength.textContent='Weak';strength.style.color='#ff6b6b';}else if(s<60){strength.textContent='Fair';strength.style.color='#fbbf24';}else if(s<80){strength.textContent='Good';strength.style.color='#4ade80';}else{strength.textContent='Strong';strength.style.color='#4ade80';}}
function regenerate(){const pw=generate();pwText.textContent=pw;updateStrength(pw);copyBtn.textContent='CPY';copyBtn.classList.remove('copied');}
lenS.addEventListener('input',()=>{lenV.textContent=lenS.value;regenerate();});
document.querySelectorAll('.toggle-btn').forEach(b=>b.addEventListener('click',()=>{b.classList.toggle('active');if(document.querySelectorAll('.toggle-btn.active').length===0)b.classList.add('active');regenerate();}));
genBtn.addEventListener('click',regenerate);
copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(pwText.textContent).then(()=>{copyBtn.textContent='OK';copyBtn.classList.add('copied');setTimeout(()=>{copyBtn.textContent='CPY';copyBtn.classList.remove('copied');},1500);});});
regenerate();
</script>
</body>
</html>
