<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlassMorphism Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1a0a2e,#2d1b69,#1a0a2e);overflow-x:hidden}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-shapes .shape{position:absolute;border-radius:50%;filter:blur(40px);opacity:0.4}
.bg-shapes .shape:nth-child(1){width:300px;height:300px;background:#a780ff;top:-80px;right:-60px}
.bg-shapes .shape:nth-child(2){width:250px;height:250px;background:#ff6b9d;bottom:-40px;left:-40px}
.bg-shapes .shape:nth-child(3){width:200px;height:200px;background:#6c63ff;top:40%;left:60%}
.container{width:100%;max-width:520px;position:relative;z-index:1;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:rgba(255,255,255,0.6);font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.glass-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:36px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.glass-card .deco-bar{width:36px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.glass-card h2{color:#fff;font-size:1.4rem;margin-bottom:8px}
.glass-card p{color:rgba(255,255,255,0.5);font-size:.95rem;line-height:1.7;margin-bottom:20px}
.glass-row{display:flex;gap:12px;flex-wrap:wrap}
.glass-item{flex:1;min-width:120px;padding:16px;background:rgba(255,255,255,0.04);border-radius:14px;border:1px solid rgba(255,255,255,0.06);text-align:center}
.glass-item .value{color:#fff;font-size:1.2rem;font-weight:700}
.glass-item .label{color:rgba(255,255,255,0.3);font-size:.75rem;margin-top:4px}
.glass-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.glass-grid .mini-card{padding:16px;background:rgba(255,255,255,0.04);border-radius:14px;border:1px solid rgba(255,255,255,0.06);text-align:center;transition:all .3s}
.glass-grid .mini-card:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
.glass-grid .mini-card .mc-letter{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:.65rem;font-weight:700;color:rgba(255,255,255,0.6)}
.glass-grid .mini-card span{color:rgba(255,255,255,0.4);font-size:.75rem}
@media(max-width:400px){.glass-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-shapes">
<div class="shape"></div><div class="shape"></div><div class="shape"></div>
</div>
<div class="container">
<div class="title">Glass <em>Morphism</em></div>
<div class="sub">Frosted glass UI with blur and depth</div>
<div class="glass-card">
<div class="deco-bar"></div>
<h2>Frosted Glass UI</h2>
<p>Modern glassmorphism design with backdrop blur, translucent backgrounds, and layered depth effects.</p>
<div class="glass-row">
<div class="glass-item"><div class="value">12px</div><div class="label">Border Radius</div></div>
<div class="glass-item"><div class="value">20px</div><div class="label">Blur Amount</div></div>
<div class="glass-item"><div class="value">8%</div><div class="label">Opacity</div></div>
</div>
<div class="glass-grid">
<div class="mini-card"><div class="mc-letter">D</div><span>Design</span></div>
<div class="mini-card"><div class="mc-letter">Z</div><span>Depth</span></div>
<div class="mini-card"><div class="mc-letter">P</div><span>Premium</span></div>
<div class="mini-card"><div class="mc-letter">F</div><span>Fluid</span></div>
</div>
</div>
</div>
</body>
</html>
