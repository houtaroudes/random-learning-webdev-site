<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Effects Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#1a1a2e,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:640px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#ff6b9d;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.hover-btn{padding:24px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;color:rgba(255,255,255,0.6);font-size:.85rem;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden}
.hover-btn .hb-letter{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;transition:transform .3s}
.underline-effect{position:relative}
.underline-effect::after{content:'';position:absolute;bottom:10px;left:25%;right:25%;height:2px;background:#58a6ff;border-radius:1px;transform:scaleX(0);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.underline-effect:hover::after{transform:scaleX(1)}
.underline-effect:hover .hb-letter{transform:translateY(-2px)}
.fill-effect{transition:all .3s}
.fill-effect:hover{background:#58a6ff;color:#0d1117;border-color:#58a6ff;transform:translateY(-2px)}
.fill-effect:hover .hb-letter{transform:scale(1.15)}
.shine-effect{overflow:hidden}
.shine-effect::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transform:translateX(-100%);transition:transform .5s}
.shine-effect:hover::before{transform:translateX(100%)}
.shine-effect:hover{border-color:rgba(255,255,255,0.12)}
.scale-effect:hover{transform:scale(1.08);background:rgba(167,128,255,0.06);border-color:rgba(167,128,255,0.15)}
.scale-effect:hover .hb-letter{transform:scale(1.15) rotate(-5deg)}
.border-glow-effect{transition:all .3s}
.border-glow-effect:hover{box-shadow:0 0 20px rgba(255,107,157,0.15),0 0 40px rgba(255,107,157,0.05);border-color:#ff6b9d}
.border-glow-effect:hover .hb-letter{animation:bounce .4s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.rotate-effect{transition:all .3s}
.rotate-effect:hover{transform:rotate(3deg) scale(1.03);background:rgba(255,209,102,0.04);border-color:rgba(255,209,102,0.15)}
.rotate-effect:hover .hb-letter{transform:rotate(-8deg)}
.slide-up-effect{transition:all .3s}
.slide-up-effect:hover{transform:translateY(-8px);background:rgba(74,222,128,0.04);border-color:rgba(74,222,128,0.15);box-shadow:0 12px 24px rgba(0,0,0,0.15)}
.slide-up-effect:hover .hb-letter{transform:translateY(-3px)}
.shadow-effect{transition:all .3s}
.shadow-effect:hover{box-shadow:0 8px 24px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.08);transform:translateY(-2px)}
.shadow-effect:hover .hb-letter{transform:scale(1.1)}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<div class="title">Hover <em>Effects</em></div>
<div class="sub">Nine CSS hover effect techniques</div>
<div class="grid">
<button class="hover-btn underline-effect"><div class="hb-letter" style="background:#58a6ff">U</div>Underline</button>
<button class="hover-btn fill-effect"><div class="hb-letter" style="background:#e34f26">F</div>Fill</button>
<button class="hover-btn shine-effect"><div class="hb-letter" style="background:#f59e0b">S</div>Shine</button>
<button class="hover-btn scale-effect"><div class="hb-letter" style="background:#a780ff">Z</div>Scale</button>
<button class="hover-btn border-glow-effect"><div class="hb-letter" style="background:#ff6b9d">G</div>Glow</button>
<button class="hover-btn rotate-effect"><div class="hb-letter" style="background:#ffd166">R</div>Rotate</button>
<button class="hover-btn slide-up-effect"><div class="hb-letter" style="background:#4ade80">U</div>Slide Up</button>
<button class="hover-btn shadow-effect"><div class="hb-letter" style="background:#8489bd">S</div>Shadow</button>
<button class="hover-btn" style="background:rgba(167,128,255,0.03)"><div class="hb-letter" style="background:#a780ff">P</div>Pulse</button>
</div>
</div>
</body>
</html>
