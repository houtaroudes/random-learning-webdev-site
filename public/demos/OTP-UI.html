<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Input Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#1a1333,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#a780ff;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.otp-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 32px;backdrop-filter:blur(12px)}
.otp-icon{width:48px;height:48px;border-radius:12px;background:rgba(167,128,255,0.08);border:1px solid rgba(167,128,255,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.2rem;font-weight:300;color:#a780ff}
.otp-label{color:rgba(255,255,255,0.5);font-size:.85rem;margin-bottom:24px}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.otp-input{width:52px;height:60px;text-align:center;font-size:1.5rem;font-weight:600;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;outline:none;transition:all .2s;font-family:inherit}
.otp-input:focus{border-color:#a780ff;box-shadow:0 0 0 3px rgba(167,128,255,0.15);background:rgba(167,128,255,0.04);transform:translateY(-2px)}
.otp-input.filled{border-color:rgba(167,128,255,0.3);background:rgba(167,128,255,0.06)}
.verify-btn{width:100%;padding:14px;background:#a780ff;border:none;border-radius:12px;color:#0d1117;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;opacity:0.5}
.verify-btn.active{opacity:1}
.verify-btn.active:hover{background:#b991ff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(167,128,255,0.3)}
.verify-result{margin-top:16px;padding:12px;border-radius:10px;font-size:.85rem;display:none}
.verify-result.success{display:block;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:#4ade80}
.verify-result.error{display:block;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);color:#ff6b6b}
.resend{color:rgba(255,255,255,0.25);font-size:.8rem;margin-top:16px}
.resend a{color:#a780ff;text-decoration:none;cursor:pointer}
.resend a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<div class="title">OTP <em>Verification</em></div>
<div class="sub">Enter the 6-digit code sent to your device</div>
<div class="otp-card">
<div class="otp-icon">*</div>
<div class="otp-label">We've sent a code to user@email.com</div>
<div class="otp-inputs" id="otpContainer">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
<input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
</div>
<button class="verify-btn" id="verifyBtn">Verify Code</button>
<div class="verify-result" id="verifyResult"></div>
<div class="resend">Didn't get it? <a id="resendLink">Resend code</a></div>
</div>
</div>
<script>
const inputs=document.querySelectorAll('.otp-input'),verifyBtn=document.getElementById('verifyBtn'),verifyResult=document.getElementById('verifyResult'),resendLink=document.getElementById('resendLink');
function update(){const f=Array.from(inputs).every(i=>i.value!=='');inputs.forEach((i,idx)=>i.classList.toggle('filled',!!i.value));verifyBtn.classList.toggle('active',f);}
inputs.forEach((input,idx)=>{
input.addEventListener('input',()=>{const v=input.value.replace(/[^0-9]/g,'');input.value=v.slice(0,1);update();if(v&&idx<inputs.length-1)inputs[idx+1].focus();});
input.addEventListener('keydown',(e)=>{if(e.key==='Backspace'&&!input.value&&idx>0){inputs[idx-1].focus();inputs[idx-1].value='';update();}if(e.key==='ArrowLeft'&&idx>0)inputs[idx-1].focus();if(e.key==='ArrowRight'&&idx<inputs.length-1)inputs[idx+1].focus();});
input.addEventListener('focus',()=>input.select());
});
verifyBtn.addEventListener('click',()=>{const code=Array.from(inputs).map(i=>i.value).join('');if(code.length!==6)return;verifyResult.className='verify-result '+(code==='123456'?'success':'error');verifyResult.textContent=code==='123456'?'Verified successfully! Welcome back.':'Invalid code. Please try again.';});
resendLink.addEventListener('click',(e)=>{e.preventDefault();verifyResult.className='verify-result success';verifyResult.textContent='A new code has been sent!';inputs.forEach(i=>{i.value='';});update();inputs[0].focus();});
inputs[0].focus();
</script>
</body>
</html>
