<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Playground Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#1a1a2e,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:520px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;font-weight:600;background:linear-gradient(90deg,#ff6b6b,#f59e0b,#4ade80,#58a6ff,#a780ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.workspace{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.color-preview{width:100%;height:120px;border-radius:16px;margin-bottom:24px;transition:background .15s;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:.9rem;font-weight:600}
.sliders{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.slider-group{display:flex;align-items:center;gap:12px}
.slider-group .sl-label{font-size:.85rem;font-weight:600;min-width:12px;color:rgba(255,255,255,0.5)}
.slider-group input[type="range"]{flex:1;accent-color:#58a6ff;cursor:pointer}
.slider-group .sl-value{min-width:36px;text-align:right;font-family:monospace;font-size:.85rem;color:rgba(255,255,255,0.4)}
.hex-display{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:16px}
.hex-display .hex-label{color:rgba(255,255,255,0.2);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em}
.hex-display .hex-value{color:#fff;font-family:monospace;font-size:1rem;font-weight:600}
.copy-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:inherit}
.copy-btn:hover{color:#fff;border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.06)}
.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.preset{width:32px;height:32px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s}
.preset:hover{transform:scale(1.15);border-color:rgba(255,255,255,0.2)}
.preset.active{border-color:#fff}
</style>
</head>
<body>
<div class="container">
<div class="title">Color <em>Playground</em></div>
<div class="sub">RGB color manipulation tool</div>
<div class="workspace">
<div class="color-preview" id="preview" style="background:#58a6ff">#58a6ff</div>
<div class="sliders">
<div class="slider-group"><span class="sl-label" style="color:#ff6b6b">R</span><input type="range" id="rs" min="0" max="255" value="88"><span class="sl-value" id="rv">88</span></div>
<div class="slider-group"><span class="sl-label" style="color:#4ade80">G</span><input type="range" id="gs" min="0" max="255" value="166"><span class="sl-value" id="gv">166</span></div>
<div class="slider-group"><span class="sl-label" style="color:#58a6ff">B</span><input type="range" id="bs" min="0" max="255" value="255"><span class="sl-value" id="bv">255</span></div>
</div>
<div class="hex-display"><span class="hex-label">HEX</span><span class="hex-value" id="hexValue">#58a6ff</span><button class="copy-btn" id="copyBtn">Copy</button></div>
<div class="presets">
<button class="preset active" style="background:#58a6ff" data-color="#58a6ff"></button>
<button class="preset" style="background:#ff6b6b" data-color="#ff6b6b"></button>
<button class="preset" style="background:#4ade80" data-color="#4ade80"></button>
<button class="preset" style="background:#f59e0b" data-color="#f59e0b"></button>
<button class="preset" style="background:#a780ff" data-color="#a780ff"></button>
<button class="preset" style="background:#ff6b9d" data-color="#ff6b9d"></button>
<button class="preset" style="background:#fff" data-color="#ffffff"></button>
<button class="preset" style="background:#0d1117;border-color:rgba(255,255,255,0.1)" data-color="#0d1117"></button>
</div>
</div>
</div>
<script>
const rs=document.getElementById('rs'),gs=document.getElementById('gs'),bs=document.getElementById('bs');
const rv=document.getElementById('rv'),gv=document.getElementById('gv'),bv=document.getElementById('bv');
const preview=document.getElementById('preview'),hexValue=document.getElementById('hexValue'),copyBtn=document.getElementById('copyBtn');
function toHex(v){return v.toString(16).padStart(2,'0')}
function update(){const r=parseInt(rs.value),g=parseInt(gs.value),b=parseInt(bs.value);const hex='#'+toHex(r)+toHex(g)+toHex(b);rv.textContent=r;gv.textContent=g;bv.textContent=b;preview.style.background=hex;preview.textContent=hex;hexValue.textContent=hex;}
rs.addEventListener('input',update);gs.addEventListener('input',update);bs.addEventListener('input',update);
document.querySelectorAll('.preset').forEach(p=>p.addEventListener('click',()=>{
const hex=p.dataset.color;rs.value=parseInt(hex.slice(1,3),16);gs.value=parseInt(hex.slice(3,5),16);bs.value=parseInt(hex.slice(5,7),16);
document.querySelectorAll('.preset').forEach(p2=>p2.classList.remove('active'));p.classList.add('active');update();
}));
copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(hexValue.textContent).then(()=>{copyBtn.textContent='Copied';setTimeout(()=>{copyBtn.textContent='Copy';},1000);});});
update();
</script>
</body>
</html>
