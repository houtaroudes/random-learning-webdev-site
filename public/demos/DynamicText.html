<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Text Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#1a1a2e,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:600px;text-align:center}
.title{color:#fff;margin-bottom:48px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#58a6ff;font-weight:600}
.text-display{min-height:120px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap}
.char-animate{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:#58a6ff;display:inline-block;opacity:0;transform:translateY(20px) rotateX(40deg);animation:charAppear .5s cubic-bezier(.34,1.56,.64,1) forwards}
.char-animate:nth-child(1){animation-delay:.05s}
.char-animate:nth-child(2){animation-delay:.1s}
.char-animate:nth-child(3){animation-delay:.15s}
@keyframes charAppear{0%{opacity:0;transform:translateY(20px) rotateX(40deg)}100%{opacity:1;transform:translateY(0) rotateX(0)}}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:32px}
.controls input{padding:12px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:.95rem;outline:none;font-family:inherit;min-width:240px;transition:border-color .2s}
.controls input:focus{border-color:#58a6ff}
.controls button{padding:12px 24px;background:#58a6ff;border:none;border-radius:12px;color:#0d1117;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.controls button:hover{background:#79b8ff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(88,166,255,0.2)}
.typewriter-text{font-size:clamp(1.1rem,3vw,1.5rem);color:rgba(255,255,255,0.5);margin-top:32px;min-height:3rem;font-family:monospace}
.typewriter-text .cursor{animation:blink .8s steps(2) infinite;color:#58a6ff}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="container">
<div class="title">Dynamic <em>Text</em></div>
<div class="text-display" id="charDisplay">
<span class="char-animate">H</span><span class="char-animate">e</span><span class="char-animate">l</span><span class="char-animate">l</span><span class="char-animate">o</span>
<span class="char-animate" style="width:.5em"></span>
<span class="char-animate">W</span><span class="char-animate">o</span><span class="char-animate">r</span><span class="char-animate">l</span><span class="char-animate">d</span><span class="char-animate">!</span>
</div>
<div class="typewriter-text" id="typewriter"></div>
<div class="controls">
<input type="text" id="textInput" placeholder="Type something..." value="Dynamic Text Animation">
<button id="animateBtn">Animate</button>
</div>
</div>
<script>
const charDisplay=document.getElementById('charDisplay'),typewriter=document.getElementById('typewriter'),textInput=document.getElementById('textInput'),animateBtn=document.getElementById('animateBtn');
function animateText(t){charDisplay.innerHTML='';t.split('').forEach((c,i)=>{const s=document.createElement('span');s.className='char-animate';s.textContent=c;s.style.animationDelay=`${i*0.06}s`;charDisplay.appendChild(s);});}
function animateTypewriter(t){typewriter.innerHTML='';let i=0;const iv=setInterval(()=>{if(i>=t.length){clearInterval(iv);typewriter.innerHTML=t+'<span class="cursor">|</span>';return;}typewriter.innerHTML=t.slice(0,i+1)+'<span class="cursor">|</span>';i++;},45);}
animateBtn.addEventListener('click',()=>{const t=textInput.value||'Dynamic Text Animation';animateText(t);setTimeout(()=>animateTypewriter(t),t.length*60+300);});
textInput.addEventListener('keydown',(e)=>{if(e.key==='Enter')animateBtn.click();});
setTimeout(()=>animateTypewriter('Character by character animation...'),500);
</script>
</body>
</html>
