<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#1a1a2e,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#58a6ff;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.input-row{display:flex;gap:10px;margin-bottom:24px}
.input-row input{flex:1;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .2s}
.input-row input:focus{border-color:#58a6ff}
.input-row input::placeholder{color:rgba(255,255,255,0.15)}
.input-row button{padding:14px 24px;background:#58a6ff;border:none;border-radius:12px;color:#0d1117;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.input-row button:hover{background:#79b8ff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(88,166,255,0.2)}
.qr-container{display:flex;justify-content:center;margin-bottom:20px}
#qrCanvas{image-rendering:pixelated;border-radius:16px;background:#fff;padding:12px;max-width:100%}
.download-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);padding:10px 20px;border-radius:10px;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:inherit}
.download-btn:hover{color:#fff;border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.06)}
.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.04)}
.preset-btn{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);padding:8px 14px;border-radius:8px;color:rgba(255,255,255,0.3);font-size:.7rem;cursor:pointer;transition:all .2s;font-family:inherit}
.preset-btn:hover{background:rgba(88,166,255,0.04);color:#58a6ff;border-color:rgba(88,166,255,0.1)}
</style>
</head>
<body>
<div class="container">
<div class="title">QR <em>Code</em> Generator</div>
<div class="sub">Generate QR codes from text or URLs</div>
<div class="card">
<div class="input-row">
<input type="text" id="qrInput" placeholder="Enter text or URL..." value="https://example.com">
<button id="generateBtn">Generate</button>
</div>
<div class="qr-container"><canvas id="qrCanvas" width="220" height="220"></canvas></div>
<button class="download-btn" id="downloadBtn">Download PNG</button>
<div class="presets">
<button class="preset-btn" data-value="https://github.com">GitHub</button>
<button class="preset-btn" data-value="https://react.dev">React</button>
<button class="preset-btn" data-value="WIFI:T:WPA;S:Network;P:password;;">WiFi</button>
<button class="preset-btn" data-value="mailto:hello@example.com">Email</button>
</div>
</div>
</div>
<script>
const input=document.getElementById('qrInput'),canvas=document.getElementById('qrCanvas'),ctx=canvas.getContext('2d');
const genBtn=document.getElementById('generateBtn'),dlBtn=document.getElementById('downloadBtn');
function generateMatrix(t){const len=t.length,size=21+Math.ceil(len/4)*4;const m=Array(size).fill(0).map(()=>Array(size).fill(0));
[[0,0],[0,size-7],[size-7,0]].forEach(([x,y])=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++){if(i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4)){if(x+i<size&&y+j<size)m[x+i][y+j]=1;}}});let seed=0;for(const c of t)seed=(seed*31+c.charCodeAt(0))&0x7fffffff;const r=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
for(let y=0;y<size;y++)for(let x=0;x<size;x++)if(m[y][x]===0)m[y][x]=(x<2||x>=size-2||y<2||y>=size-2)?0:(r()>0.55?1:0);
for(let i=8;i<size-8;i++){if(m[6][i]===0)m[6][i]=i%2===0?0:1;if(m[i][6]===0)m[i][6]=i%2===0?0:1;}return m;}
function renderQR(t){const m=generateMatrix(t||' ');const s=m.length,cs=8;canvas.width=s*cs;canvas.height=s*cs;ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0d1117';for(let y=0;y<s;y++)for(let x=0;x<s;x++)if(m[y][x])ctx.fillRect(x*cs,y*cs,cs,cs);}
function generate(){renderQR(input.value.trim()||'Hello, World!');}
input.addEventListener('keydown',(e)=>{if(e.key==='Enter')generate();});
genBtn.addEventListener('click',generate);
dlBtn.addEventListener('click',()=>{const a=document.createElement('a');a.download='qrcode.png';a.href=canvas.toDataURL('image/png');a.click();});
document.querySelectorAll('.preset-btn').forEach(b=>{b.addEventListener('click',()=>{input.value=b.dataset.value;generate();});});
generate();
</script>
</body>
</html>
