<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Labels Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#161b22,#0d1117);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:440px;text-align:center}
.title{color:#fff;margin-bottom:8px;font-size:1.5rem;font-weight:300}
.title em{font-style:normal;color:#58a6ff;font-weight:600}
.sub{color:rgba(255,255,255,0.2);margin-bottom:32px;font-size:.85rem}
.form-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.form-group{position:relative;margin-bottom:24px}
.form-group textarea{resize:vertical;min-height:100px}
.floating-input{width:100%;padding:18px 16px 10px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:12px;outline:none;color:#fff;font-size:1rem;font-family:inherit;transition:all .25s;position:relative;z-index:1}
.floating-input:focus{border-color:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,0.1);background:rgba(88,166,255,0.04)}
.floating-label{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.25);font-size:.95rem;pointer-events:none;transition:all .2s cubic-bezier(.4,0,.2,1);z-index:2;padding:0 4px}
.floating-input:focus ~ .floating-label,.floating-input.has-value ~ .floating-label{top:6px;transform:translateY(0);font-size:.7rem;color:#58a6ff}
.form-group textarea ~ .floating-label{top:18px;transform:translateY(0)}
.form-group textarea:focus ~ .floating-label,.form-group textarea.has-value ~ .floating-label{top:6px;font-size:.7rem;color:#58a6ff}
.submit-btn{width:100%;padding:14px;background:#58a6ff;border:none;border-radius:12px;color:#0d1117;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.submit-btn:hover{background:#79b8ff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(88,166,255,0.3)}
</style>
</head>
<body>
<div class="container">
<div class="title">Floating <em>Labels</em></div>
<div class="sub">Animated form labels that float on focus</div>
<div class="form-card">
<div class="form-group"><input type="text" class="floating-input" id="name"><label class="floating-label" for="name">Full Name</label></div>
<div class="form-group"><input type="email" class="floating-input" id="email"><label class="floating-label" for="email">Email Address</label></div>
<div class="form-group"><input type="password" class="floating-input" id="password"><label class="floating-label" for="password">Password</label></div>
<div class="form-group"><textarea class="floating-input" id="message"></textarea><label class="floating-label" for="message">Your Message</label></div>
<button class="submit-btn">Submit</button>
</div>
</div>
<script>
document.querySelectorAll('.floating-input').forEach(i=>{
i.addEventListener('input',()=>i.classList.toggle('has-value',!!i.value.trim()));
i.addEventListener('blur',()=>i.classList.toggle('has-value',!!i.value.trim()));
});
</script>
</body>
</html>
